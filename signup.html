<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Free — Voice of Ukraine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
<style>
:root{--blue:#1a4d8f;--blue-dark:#0d2d5a;--blue-mid:#2563a8;--blue-light:#dbeafe;--yellow:#f5c518;--yellow-dark:#d4a800;--yellow-light:#fef9c3;--green:#059669;--red:#dc2626;--text:#111827;--text-mid:#374151;--text-muted:#6b7280;--bg:#fafaf8;--surface:#fff;--border:#e5e7eb;--radius:12px;--nav-h:70px;--serif:'Playfair Display',Georgia,serif;--body:'Source Serif 4',Georgia,serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:linear-gradient(135deg,var(--blue-dark),#0a1a35);min-height:100vh;color:var(--text);line-height:1.65}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit}
input,select,textarea{font:inherit}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-h);background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;height:100%;max-width:1200px;margin:0 auto;padding:0 24px;gap:8px}
.nav-logo{font-family:var(--serif);font-size:1.3rem;font-weight:900;display:flex;align-items:baseline;gap:2px}
.logo-ua{color:var(--blue)}.logo-en{color:var(--yellow-dark);font-style:italic}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:7px;font-family:var(--mono);font-size:.82rem;letter-spacing:.04em;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none}
.btn-ghost{background:transparent;color:var(--text-mid);padding:10px 22px;border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:var(--blue);color:#fff;padding:11px 24px;border:2px solid var(--blue)}
.btn-primary:hover{background:var(--blue-dark);border-color:var(--blue-dark)}
.btn-yellow{background:var(--yellow);color:var(--blue-dark);padding:13px 28px;border:2px solid var(--yellow);font-weight:600}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.55;cursor:not-allowed}
.page-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:calc(var(--nav-h) + 30px) 20px 50px}
.card{background:var(--surface);border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.14);padding:44px 40px;width:100%;max-width:520px}
.fh{text-align:center;margin-bottom:32px}
.fh .icon{font-size:2.4rem;margin-bottom:14px}
.fh h1{font-family:var(--serif);font-size:1.85rem;font-weight:700;margin-bottom:7px}
.fh p{font-size:.9rem;color:var(--text-muted)}
.steps{display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.step-w{display:flex;flex-direction:column;align-items:center;gap:4px}
.step-c{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.72rem;font-weight:600;color:var(--text-muted);transition:all .3s}
.step-c.active{border-color:var(--blue);background:var(--blue);color:#fff}
.step-c.done{border-color:var(--green);background:var(--green);color:#fff}
.step-l{font-family:var(--mono);font-size:.6rem;color:var(--text-muted);text-align:center}
.step-line{width:44px;height:2px;background:var(--border);margin-bottom:16px;transition:background .3s}
.step-line.done{background:var(--green)}
.prog-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:26px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(to right,var(--blue),var(--yellow));border-radius:2px;transition:width .4s}
.fg{margin-bottom:18px}
.fg label{display:block;font-family:var(--mono);font-size:.72rem;letter-spacing:.09em;text-transform:uppercase;color:var(--text-mid);margin-bottom:7px}
.fg label .opt{font-size:.65rem;color:var(--text-muted);text-transform:none;letter-spacing:0;margin-left:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.94rem;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s,box-shadow .2s}
.fg input:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,77,143,.1)}
.fg input.err{border-color:var(--red)}
.ferr{font-family:var(--mono);font-size:.7rem;color:var(--red);margin-top:4px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.otp-row{display:flex;gap:8px}
.otp-row input{flex:1}
.otp-send{padding:0 14px;background:var(--blue-light);color:var(--blue);border:1.5px solid var(--blue);border-radius:8px;font-family:var(--mono);font-size:.72rem;white-space:nowrap;cursor:pointer;transition:all .2s}
.otp-send:hover{background:var(--blue);color:#fff}
.otp-send:disabled{opacity:.5;cursor:not-allowed}
.otp-digits{display:flex;gap:8px;justify-content:center;margin:12px 0}
.otp-d{width:48px;height:56px;border:2px solid var(--border);border-radius:9px;font-family:var(--mono);font-size:1.4rem;font-weight:600;text-align:center;outline:none;background:var(--bg);transition:border-color .2s,box-shadow .2s}
.otp-d:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,77,143,.14)}
.otp-d.filled{border-color:var(--blue);background:var(--blue-light)}
.otp-ok{display:none;align-items:center;gap:6px;justify-content:center;font-family:var(--mono);font-size:.75rem;color:var(--green)}
.otp-ok.show{display:flex}
.resend-lnk{background:none;border:none;font-family:var(--mono);font-size:.75rem;color:var(--blue);text-decoration:underline;cursor:pointer;display:block;margin:6px auto}
.resend-lnk:disabled{color:var(--text-muted);text-decoration:none;cursor:default}
.check-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--yellow-light);border:1px solid #fde68a;border-radius:8px;margin-bottom:16px;cursor:pointer}
.check-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.check-row label{font-size:.86rem;color:var(--text-mid);cursor:pointer;flex:1}
.check-row .pill{font-family:var(--mono);font-size:.62rem;background:var(--blue);color:#fff;padding:2px 7px;border-radius:4px;flex-shrink:0}
.info-tip{background:var(--blue-light);border:1px solid #bfdbfe;border-radius:8px;padding:11px 14px;font-size:.82rem;color:var(--blue-dark);display:flex;gap:9px;margin-bottom:14px}
.divider{height:1px;background:var(--border);margin:20px 0}
.form-note{text-align:center;margin-top:18px;font-family:var(--mono);font-size:.75rem;color:var(--text-muted)}
.form-note a{color:var(--blue)}
.success-wrap{text-align:center;padding:16px 0}
.success-wrap .s-icon{font-size:4rem;margin-bottom:16px}
.success-wrap h2{font-family:var(--serif);font-size:1.75rem;margin-bottom:10px}
.success-wrap p{color:var(--text-muted);margin-bottom:22px}
.demo-note{background:var(--yellow-light);border:1px solid #fde68a;border-radius:8px;padding:12px 14px;font-family:var(--mono);font-size:.75rem;color:#7a5c00;margin-bottom:20px;text-align:center}
.toast{position:fixed;bottom:28px;right:28px;max-width:320px;background:var(--text);color:#fff;padding:13px 18px;border-radius:10px;font-family:var(--mono);font-size:.8rem;z-index:9999;transform:translateY(80px);opacity:0;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#065f46}
.toast.error{background:#7f1d1d}
@media(max-width:480px){.frow{grid-template-columns:1fr}.otp-d{width:40px;height:48px;font-size:1.2rem}.card{padding:28px 18px}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-ua">Голос</span><span class="logo-en">Ukraine</span></a>
    <div style="margin-left:auto">
      <a href="login.html" class="btn btn-ghost">Sign In</a>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <div class="card">
    <div class="fh">
      <div class="icon">🇺🇦</div>
      <h1>Create Your Account</h1>
      <p>Free access — verify your email to unlock full articles.</p>
    </div>

    <form id="signupForm">
      <div class="fg">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Your full name" required>
        <div class="ferr" id="err-name"></div>
      </div>

      <div class="fg">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
        <div class="ferr" id="err-email"></div>
      </div>

      <div class="fg">
        <label>Password <span class="opt">Minimum 6 characters</span></label>
        <input type="password" id="password" placeholder="Create a password" minlength="6" required>
        <div class="ferr" id="err-password"></div>
      </div>

      <div class="fg">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+XXXXXXXXXXX" required>
        <div class="ferr" id="phone-hint" style="color:var(--text-muted)"></div>
        <div class="ferr" id="err-phone"></div>
      </div>

      <div class="frow">
        <div class="fg">
          <label>City</label>
          <select id="city" required>
            <option value="">Select country first</option>
          </select>
          <div class="ferr" id="city-status" style="color:var(--text-muted)"></div>
          <div class="ferr" id="err-city"></div>
        </div>
        <div class="fg">
          <label>Country</label>
          <select id="country" required>
            <option value="">Loading countries...</option>
          </select>
          <div class="ferr" id="err-country"></div>
        </div>
      </div>

      <div class="check-row" style="margin-top:4px">
        <input type="checkbox" id="consent" required>
        <label for="consent">I agree to the above fields and consent to data collection for account access control.</label>
        <span class="pill">Required</span>
      </div>
      <div class="ferr" id="err-consent" style="margin-top:-10px;margin-bottom:14px"></div>

      <button class="btn btn-primary btn-full" id="signupBtn" type="submit">Create account →</button>
      <p class="form-note">Already have an account? <a href="login.html">Sign in</a></p>
    </form>

  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script type="module" src="auth.js"></script>
</body>
</html>
