<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Verified · Voice of Ukraine</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#1a4d8f;
  --blue-dark:#0d2d5a;
  --yellow:#f5c518;
  --text:#111827;
  --muted:#6b7280;
  --bg:#fafaf8;
  --surface:#ffffff;
  --border:#e5e7eb;

  --serif:'Playfair Display',serif;
  --body:'Source Serif 4',serif;
  --mono:'JetBrains Mono',monospace;

  --radius:14px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:var(--body);
  background:linear-gradient(135deg,#0d2d5a 0%,#1a4d8f 60%,#2563a8 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.container{
  width:100%;
  max-width:520px;
  padding:24px;
}

.card{
  background:rgba(255,255,255,0.98);
  border-radius:var(--radius);
  padding:42px 32px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.2);
  animation:fadeUp .6s ease-out;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.icon{
  width:78px;
  height:78px;
  margin:0 auto 18px;
  border-radius:50%;
  background:linear-gradient(135deg,#059669,#10b981);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  color:white;
  box-shadow:0 10px 30px rgba(16,185,129,0.35);
}

h1{
  font-family:var(--serif);
  font-size:2rem;
  color:var(--blue-dark);
  margin-bottom:10px;
}

p{
  color:var(--muted);
  font-size:1rem;
  line-height:1.6;
  margin-bottom:22px;
}

.highlight{
  color:var(--blue);
  font-weight:600;
}

.btn{
  display:inline-block;
  width:100%;
  padding:14px 18px;
  border-radius:10px;
  font-family:var(--mono);
  font-size:.85rem;
  letter-spacing:.05em;
  text-decoration:none;
  transition:all .25s;
}

.btn-primary{
  background:var(--blue);
  color:#fff;
  border:2px solid var(--blue);
}

.btn-primary:hover{
  background:var(--blue-dark);
  border-color:var(--blue-dark);
  transform:translateY(-2px);
}

.footer-note{
  margin-top:18px;
  font-size:.8rem;
  color:var(--muted);
}

.flag{
  font-size:1.4rem;
  margin-top:14px;
}

.small{
  font-family:var(--mono);
  font-size:.75rem;
  color:#94a3b8;
  margin-top:10px;
}
</style>
</head>

<body>
  <div class="container">
    <div class="card">

      <div class="icon">✓</div>

      <h1>Congratulations!</h1>

      <p>
        Your email has been successfully verified.<br>
        Welcome to <span class="highlight">Voice of Ukraine</span> community.
      </p>

      <p class="small">
        You can now access full articles, join discussions, and stay updated.
      </p>

      <a class="btn btn-primary" href="https://voiceukraine.com/login.html">
        Continue to Login
      </a>

      <div class="footer-note">
        Слава Україні 🇺🇦
      </div>

      <div class="flag">🇺🇦</div>

    </div>
  </div>
</body>
</html>
